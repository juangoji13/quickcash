version: '3'

services:
  quickcash-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: quickcash-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # - NEXT_PUBLIC_SUPABASE_URL= (Opcional, en caso que no lo lean del Build)
      # - NEXT_PUBLIC_SUPABASE_ANON_KEY=
